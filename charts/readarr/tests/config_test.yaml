suite: test config pvc
values:
  - ./values/required-values.yaml
templates:
  - config.yaml
release:
  name: test
  namespace: test
tests:
  - it: should create config PVC
    asserts:
      - hasDocuments:
          count: 1

  - it: should create a config PVC with correct specifications
    asserts:
      - equal:
          path: metadata.name
          value: test-readarr-config
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: can use an existing PVC
    set:
      config.existingClaim: existing-claim
    asserts:
      - hasDocuments:
          count: 0

  - it: can disable config PVC
    set:
      config.enabled: false
    asserts:
      - hasDocuments:
          count: 0
