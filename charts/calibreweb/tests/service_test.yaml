suite: test service
values:
  - ./values/required-values.yaml
templates:
  - service.yaml
release:
  name: test
  namespace: test
tests:
  - it: should create Service
    asserts:
      - hasDocuments:
          count: 1

  - it: should create a service with correct specifications
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8083
      - equal:
          path: spec.ports[0].protocol
          value: TCP
