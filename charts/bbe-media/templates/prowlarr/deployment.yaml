{{/*
Deploy Prowlarr only if it is not already running in the bbe-library namespace
or as a standalone release. This prevents duplicate instances when both
bbe-media and bbe-library are installed in the same cluster.
*/}}
{{- $inBbeLibrary := lookup "apps/v1" "Deployment" "bbe-library" "bbe-library-prowlarr" }}
{{- $standalone := lookup "apps/v1" "Deployment" "prowlarr" "prowlarr" }}
{{- if not (or $inBbeLibrary $standalone) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bbe-media.prowlarr.fullname" . }}
  namespace: {{ include "bbe-media.prowlarr.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "bbe-media.prowlarr.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.prowlarr.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bbe-media.prowlarr.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.prowlarr.strategyType }}
  strategy:
    type: {{ .Values.prowlarr.strategyType }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bbe-media.prowlarr.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.prowlarr.annotations }}
      annotations:
        {{- toYaml .Values.prowlarr.annotations | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: prowlarr
          image: "{{ .Values.prowlarr.image.repository }}:{{ include "bbe-media.prowlarr.image" . }}"
          env: {{- include "bbe-media.prowlarr.env" . | nindent 12 }}
          ports:
            {{- range .Values.prowlarrService.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ .protocol }}
            {{- end }}
          {{- if .Values.prowlarr.resources }}
          resources:
            {{- if .Values.prowlarr.resources.requests }}
            requests:
              {{- if .Values.prowlarr.resources.requests.memory }}
              memory: "{{ .Values.prowlarr.resources.requests.memory }}"
              {{- end }}
              {{- if .Values.prowlarr.resources.requests.cpu }}
              cpu: "{{ .Values.prowlarr.resources.requests.cpu }}"
              {{- end }}
            {{- end }}
            {{- if .Values.prowlarr.resources.limits }}
            limits:
              {{- if .Values.prowlarr.resources.limits.memory }}
              memory: "{{ .Values.prowlarr.resources.limits.memory }}"
              {{- end }}
              {{- if .Values.prowlarr.resources.limits.cpu }}
              cpu: "{{ .Values.prowlarr.resources.limits.cpu }}"
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.prowlarrConfig.enabled }}
          volumeMounts:
            - name: config
              mountPath: /config
          {{- end }}
          {{- if .Values.prowlarr.securityContext }}
          securityContext:
            {{- toYaml .Values.prowlarr.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.prowlarr.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.prowlarr.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.prowlarr.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.prowlarr.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.prowlarr.startupProbe }}
          startupProbe:
            {{- toYaml .Values.prowlarr.startupProbe | nindent 12 }}
          {{- end }}
      {{- if .Values.prowlarrConfig.enabled }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "bbe-media.prowlarr.configClaimName" . }}
      {{- end }}
{{- end }}
