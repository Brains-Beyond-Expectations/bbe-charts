# Shared Calibre library volume — mounted by both Readarr (/books) and Calibre-Web (/books).
# The PVC is created by this chart with the name "{release}-library".
# Since the bbe CLI installs this chart with release name "bbe-library", the PVC will
# be named "bbe-library-library" by default.
library:
  annotations: {}
  size: "50Gi"
  accessMode: ReadWriteMany
  retain: false

# Prowlarr is deployed inline in this chart with a bidirectional lookup guard.
# If a Prowlarr Deployment already exists in the "bbe-media" namespace (bbe-media-prowlarr)
# or as a standalone release ("prowlarr"), this chart will skip deploying its own instance.
prowlarr:
  annotations: {}
  replicas: 1
  strategyType: Recreate
  image:
    repository: lscr.io/linuxserver/prowlarr
    tag: ""
  securityContext:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
  resources:
    requests:
      memory: "512Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: ""
  env: []
  livenessProbe:
    exec:
      command:
        - /usr/bin/env
        - bash
        - -c
        - curl --fail localhost:9696/api/v1/system/status?apiKey=`IFS=\> &&
          while read -d \< E C; do if [[ $E = "ApiKey" ]]; then echo $C; fi;
          done < /config/config.xml`
    failureThreshold: 5
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 0
    periodSeconds: 10
    tcpSocket:
      port: 9696
    timeoutSeconds: 1
  startupProbe:
    failureThreshold: 30
    initialDelaySeconds: 0
    periodSeconds: 5
    tcpSocket:
      port: 9696
    timeoutSeconds: 1

prowlarrService:
  annotations: {}
  ports:
    - name: http
      port: 9696
      protocol: TCP
  type: ClusterIP

prowlarrConfig:
  annotations: {}
  enabled: true
  existingClaim: ""
  size: "1Gi"
  accessMode: ReadWriteOnce
  retain: false

# Override sub-chart defaults so both Readarr and Calibre-Web share
# the single "bbe-library-library" PVC for the Calibre library.
readarr:
  books:
    existingClaim: "bbe-library-library"

calibreweb:
  books:
    existingClaim: "bbe-library-library"
