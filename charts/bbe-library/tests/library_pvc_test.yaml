suite: test library pvc
values:
  - ./values/required-values.yaml
templates:
  - library-pvc.yaml
release:
  name: bbe-library
  namespace: bbe-library
tests:
  - it: should create library PVC
    asserts:
      - hasDocuments:
          count: 1

  - it: should create a library PVC with correct specifications
    asserts:
      - equal:
          path: metadata.name
          value: bbe-library-library
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi
      - notEqual:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: "keep"

  - it: can set retain annotation
    set:
      library.retain: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: "keep"
