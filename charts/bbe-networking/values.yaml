bbe:
  metallb:
    blocky:
      ipAddressPool:

# acme.email is required — it is used to register the Let's Encrypt account and
# receive expiry notifications.
  certManager:
    acme:
      email: ""
      # staging uses Let's Encrypt's test CA (untrusted but no rate limits).
      # Set to false once you have confirmed issuance works.
      staging: false

metallb:
  speaker:
    ignoreExcludeLB: true

ingress-nginx:
  controller:
    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP:
    allowSnippetAnnotations: true
    config:
      annotations-risk-level: Critical
      strict-validate-path-type: false
    ingressClassResource:
      name: nginx
      enabled: true
      default: true
      controllerValue: "k8s.io/ingress-nginx"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

cert-manager:
  crds:
    enabled: true
