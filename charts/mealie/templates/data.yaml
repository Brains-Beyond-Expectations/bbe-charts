{{- if and .Values.data.enabled (not .Values.data.existingClaim) }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "mealie.dataClaimName" . }}
  namespace: {{ include "mealie.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "mealie.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with (include "mealie.dataAnnotations" .) }}
  annotations: {{- . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.data.accessMode }}
  resources:
    requests:
      storage: {{ .Values.data.size }}
{{- end }}
